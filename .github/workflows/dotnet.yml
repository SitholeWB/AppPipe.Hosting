name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
        include-prerelease: true
        
    - name: Restore dependencies
      run: dotnet restore AppPipe.slnx
      
    - name: Build
      run: dotnet build AppPipe.slnx --no-restore -c Release
      
    - name: Test
      run: dotnet test AppPipe.slnx --no-build -c Release --verbosity normal
